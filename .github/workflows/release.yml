name: release

# Publishes to PyPI on a version tag (vX.Y.Z). Auth via the repo secret
# PYPI_API_TOKEN (a PyPI project/account API token). Set it once with:
#   gh secret set PYPI_API_TOKEN -R SurrealMindAI/pydantic-zod-codegen

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version $VERSION"
          sed -i "0,/^version = .*/s//version = \"$VERSION\"/" pyproject.toml

      - name: Build sdist + wheel
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
